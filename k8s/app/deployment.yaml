apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkly
  namespace: linkly
  labels:
    app: linkly
spec:
  replicas: 2
  selector:
    matchLabels:
      app: linkly
  template:
    metadata:
      labels:
        app: linkly
    spec:
      containers:
        - name: linkly
          image: linkly:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: linkly-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: linkly-db
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
